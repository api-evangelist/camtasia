      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: project-management-media.gettrackmedia
      outputParameters:
      - type: object
        mapping: $.
    - name: camtasia-update-media-item-track
      description: Camtasia Update a media item on a track
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: project-management-media.updatetrackmedia
      with:
