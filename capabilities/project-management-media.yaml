naftiko: 1.0.0-alpha2
info:
  label: Camtasia Project Management API — Media
  description: 'Camtasia Project Management API — Media. 5 operations. Lead operation: Camtasia List media on a track. Self-contained
    Naftiko capability covering one Camtasia business surface.'
  tags:
  - Camtasia
  - Media
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAMTASIA_API_KEY: CAMTASIA_API_KEY
capability:
