        name: gettrackmedia
        description: Camtasia Get a media item on a track
        call: project-management-media.gettrackmedia
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatetrackmedia
        description: Camtasia Update a media item on a track
        call: project-management-media.updatetrackmedia
        with:
          body: rest.body
        outputParameters:
        - type: object
