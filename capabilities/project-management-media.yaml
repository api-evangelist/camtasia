  - type: http
    namespace: project-management-media
    baseUri: https://api.techsmith.com/camtasia/v1
    description: Camtasia Project Management API — Media business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-tracks-trackId-media
      path: /projects/{projectId}/tracks/{trackId}/media
      operations:
      - name: listtrackmedia
        method: GET
        description: Camtasia List media on a track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addmediatotrack
        method: POST
        description: Camtasia Add media to a track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId-tracks-trackId-media-mediaId
      path: /projects/{projectId}/tracks/{trackId}/media/{mediaId}
      operations:
      - name: gettrackmedia
        method: GET
        description: Camtasia Get a media item on a track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatetrackmedia
        method: PUT
        description: Camtasia Update a media item on a track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removetrackmedia
        method: DELETE
        description: Camtasia Remove media from a track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CAMTASIA_API_KEY}}'
  exposes:
  - type: rest
    namespace: project-management-media-rest
    port: 8080
    description: REST adapter for Camtasia Project Management API — Media. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/tracks/{trackid}/media
      name: projects-projectid-tracks-trackid-media
      description: REST surface for projects-projectId-tracks-trackId-media.
      operations:
      - method: GET
        name: listtrackmedia
        description: Camtasia List media on a track
        call: project-management-media.listtrackmedia
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addmediatotrack
        description: Camtasia Add media to a track
        call: project-management-media.addmediatotrack
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/tracks/{trackid}/media/{mediaid}
      name: projects-projectid-tracks-trackid-media-mediaid
      description: REST surface for projects-projectId-tracks-trackId-media-mediaId.
      operations:
