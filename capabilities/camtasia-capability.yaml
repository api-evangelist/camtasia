        method: GET
        description: Camtasia List asset categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: categories-categoryid
      path: /categories/{categoryId}
      operations:
      - name: getcategory
        method: GET
        description: Camtasia Get a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
