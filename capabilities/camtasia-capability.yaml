naftiko: 1.0.0-alpha2
info:
  label: Camtasia Asset Library API
  description: API for accessing and managing media assets, templates, and libraries within TechSmith Camtasia. Provides programmatic
    access to browse, search, download, and manage video assets, audio tracks, images, templates, themes, and other media
    resources used in Camtasia projects.
  tags:
  - Camtasia
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: camtasia
    baseUri: https://api.techsmith.com/camtasia/v1
    description: Camtasia Asset Library API HTTP API.
    authentication:
      type: bearer
      token: '{{CAMTASIA_TOKEN}}'
    resources:
    - name: assets
      path: /assets
      operations:
      - name: listassets
        method: GET
        description: Camtasia List assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadasset
        method: POST
        description: Camtasia Upload an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-assetid
      path: /assets/{assetId}
      operations:
      - name: getasset
        method: GET
        description: Camtasia Get an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateasset
        method: PUT
        description: Camtasia Update an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteasset
        method: DELETE
        description: Camtasia Delete an asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-assetid-download
      path: /assets/{assetId}/download
      operations:
      - name: downloadasset
        method: GET
        description: Camtasia Download an asset file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assets-assetid-preview
      path: /assets/{assetId}/preview
      operations:
      - name: getassetpreview
        method: GET
        description: Camtasia Get asset preview
        inputParameters:
        - name: size
          in: query
          type: string
          description: Preview size
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: templates
      path: /templates
      operations:
      - name: listtemplates
        method: GET
        description: Camtasia List templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: templates-templateid
      path: /templates/{templateId}
      operations:
      - name: gettemplate
        method: GET
        description: Camtasia Get a template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: templates-templateid-download
      path: /templates/{templateId}/download
      operations:
      - name: downloadtemplate
        method: GET
        description: Camtasia Download a template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: libraries
      path: /libraries
      operations:
      - name: listlibraries
        method: GET
        description: Camtasia List libraries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: libraries-libraryid
      path: /libraries/{libraryId}
