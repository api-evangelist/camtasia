      - name: getlibrary
        method: GET
        description: Camtasia Get a library
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: libraries-libraryid-assets
      path: /libraries/{libraryId}/assets
      operations:
      - name: listlibraryassets
        method: GET
        description: Camtasia List assets in a library
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: categories
      path: /categories
