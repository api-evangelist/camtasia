naftiko: 1.0.0-alpha2
info:
  label: Camtasia Asset Library API — Libraries
  description: 'Camtasia Asset Library API — Libraries. 3 operations. Lead operation: Camtasia List libraries. Self-contained
    Naftiko capability covering one Camtasia business surface.'
  tags:
  - Camtasia
  - Libraries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAMTASIA_API_KEY: CAMTASIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: asset-library-libraries
    baseUri: https://api.techsmith.com/camtasia/v1
    description: Camtasia Asset Library API — Libraries business capability. Self-contained, no shared references.
    resources:
    - name: libraries
      path: /libraries
      operations:
      - name: listlibraries
        method: GET
        description: Camtasia List libraries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: libraries-libraryId
      path: /libraries/{libraryId}
      operations:
      - name: getlibrary
        method: GET
        description: Camtasia Get a library
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: libraries-libraryId-assets
      path: /libraries/{libraryId}/assets
      operations:
      - name: listlibraryassets
        method: GET
        description: Camtasia List assets in a library
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CAMTASIA_API_KEY}}'
  exposes:
  - type: rest
    namespace: asset-library-libraries-rest
    port: 8080
    description: REST adapter for Camtasia Asset Library API — Libraries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/libraries
      name: libraries
      description: REST surface for libraries.
      operations:
      - method: GET
        name: listlibraries
        description: Camtasia List libraries
        call: asset-library-libraries.listlibraries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/libraries/{libraryid}
      name: libraries-libraryid
      description: REST surface for libraries-libraryId.
      operations:
      - method: GET
        name: getlibrary
        description: Camtasia Get a library
        call: asset-library-libraries.getlibrary
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/libraries/{libraryid}/assets
      name: libraries-libraryid-assets
      description: REST surface for libraries-libraryId-assets.
      operations:
      - method: GET
        name: listlibraryassets
        description: Camtasia List assets in a library
        call: asset-library-libraries.listlibraryassets
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: asset-library-libraries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Camtasia Asset Library API — Libraries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: camtasia-list-libraries
      description: Camtasia List libraries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-library-libraries.listlibraries
      outputParameters:
      - type: object
        mapping: $.
    - name: camtasia-get-library
      description: Camtasia Get a library
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-library-libraries.getlibrary
      outputParameters:
      - type: object
        mapping: $.
    - name: camtasia-list-assets-library
      description: Camtasia List assets in a library
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-library-libraries.listlibraryassets
      outputParameters:
      - type: object
        mapping: $.
