naftiko: 1.0.0-alpha2
info:
  label: Camtasia Asset Library API — Assets
  description: 'Camtasia Asset Library API — Assets. 6 operations. Lead operation: Camtasia List assets. Self-contained Naftiko
    capability covering one Camtasia business surface.'
  tags:
  - Camtasia
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CAMTASIA_API_KEY: CAMTASIA_API_KEY
capability:
