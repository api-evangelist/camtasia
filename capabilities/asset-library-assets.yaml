    port: 9090
    transport: http
    description: MCP adapter for Camtasia Asset Library API — Assets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: camtasia-list-assets
      description: Camtasia List assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-library-assets.listassets
      outputParameters:
      - type: object
        mapping: $.
    - name: camtasia-upload-asset
      description: Camtasia Upload an asset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: asset-library-assets.uploadasset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: camtasia-get-asset
      description: Camtasia Get an asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: asset-library-assets.getasset
      outputParameters:
      - type: object
        mapping: $.
    - name: camtasia-update-asset
      description: Camtasia Update an asset
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: asset-library-assets.updateasset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: camtasia-delete-asset
      description: Camtasia Delete an asset
